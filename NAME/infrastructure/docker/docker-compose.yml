services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phc_exchange
      POSTGRES_USER: phc_user
      POSTGRES_PASSWORD: phc_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../../database/seed/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phc_user -d phc_exchange"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+pg8000://phc_user:phc_password@db:5432/phc_exchange
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-service:8001
      SECRET_KEY: phc-exchange-super-secret-key-change-in-production-2024
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/ai.Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+pg8000://phc_user:phc_password@db:5432/phc_exchange
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../../
      dockerfile: infrastructure/docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
